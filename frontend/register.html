<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — MentorHub</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; }
    .bg-glow { position: fixed; inset: 0; background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,212,170,0.12) 0%, transparent 70%); pointer-events: none; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 44px 40px; width: 100%; max-width: 500px; animation: fadeIn 0.4s ease; }
    .auth-logo { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; margin-bottom: 28px; }
    .auth-title { font-family: var(--font-display); font-size: 1.7rem; font-weight: 800; margin-bottom: 6px; }
    .auth-sub { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 28px; }
    .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .role-option { border: 2px solid var(--border); border-radius: var(--radius-lg); padding: 20px 16px; text-align: center; cursor: pointer; transition: var(--transition); }
    .role-option:hover { border-color: var(--border-hover); }
    .role-option.selected { border-color: var(--accent-primary); background: rgba(108,99,255,0.08); }
    .role-option .role-icon { font-size: 2rem; margin-bottom: 8px; }
    .role-option .role-name { font-weight: 700; font-size: 0.95rem; }
    .role-option .role-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
    .role-input { display: none; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent-primary); font-weight: 600; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius-md); padding: 12px 16px; color: var(--accent-danger); font-size: 0.88rem; margin-bottom: 20px; display: none; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 500px) { .grid-2 { grid-template-columns: 1fr; } .auth-card { padding: 32px 24px; } }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="auth-card">
    <a href="/" class="auth-logo"><div class="brand-icon">🎓</div> MentorHub</a>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Join MentorHub and start your growth journey.</p>
    <div class="error-msg" id="errorMsg"></div>
    <form id="registerForm">
      <!-- Role Selection -->
      <div class="form-group">
        <label class="form-label">I am a...</label>
        <div class="role-selector">
          <div class="role-option selected" data-role="student">
            <div class="role-icon">📚</div>
            <div class="role-name">Student</div>
            <div class="role-desc">Find mentors & guidance</div>
          </div>
          <div class="role-option" data-role="mentor">
            <div class="role-icon">🏆</div>
            <div class="role-name">Mentor</div>
            <div class="role-desc">Share expertise & guide</div>
          </div>
        </div>
        <input type="hidden" id="roleInput" value="student" />
      </div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required />
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;" id="registerBtn">Create Account →</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
  <script src="js/api.js"></script>
  <script>
    // Role selection
    document.querySelectorAll('.role-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        document.getElementById('roleInput').value = opt.dataset.role;
      });
    });
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('errorMsg');
      const btn = document.getElementById('registerBtn');
      errEl.style.display = 'none';
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const role = document.getElementById('roleInput').value;
      if (password !== confirm) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return; }
      btn.textContent = 'Creating account...';
      btn.disabled = true;
      try {
        const data = await api.register({ name, email, password, role });
        setAuth(data.token, data.user);
        if (role === 'mentor') window.location.href = '/mentor-dashboard.html';
        else window.location.href = '/student-dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
