<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — MentorHub</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    .stat-icon.teal {
      background: rgba(0, 212, 170, 0.12);
    }

    .stat-icon.yellow {
      background: rgba(245, 158, 11, 0.12);
    }

    .stat-icon.red {
      background: rgba(239, 68, 68, 0.12);
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
    }

    .users-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .users-table td {
      padding: 12px 14px;
      font-size: 0.88rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      vertical-align: middle;
    }

    .users-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
    }

    .cat-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .cat-bar-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cat-pct {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">🎓</div> MentorHub
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-title">Admin</div>
        <a href="admin-dashboard.html" class="sidebar-link active" id="dashLink"><span class="icon">🏠</span> Dashboard</a>
        <a href="#users" class="sidebar-link" id="usersLink" onclick="showSection('users'); return false;"><span class="icon">👥</span> Manage
          Users</a>
        <a href="resources.html" class="sidebar-link"><span class="icon">📚</span> Resources</a>
      </nav>
      <div class="sidebar-footer"><a href="#" class="sidebar-link" onclick="logout()"><span class="icon">🚪</span>
          Logout</a></div>
    </aside>
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title" id="topbarTitle">Admin Dashboard</div>
        <div class="topbar-actions">
          <div id="userBadge" style="display:flex;align-items:center;gap:10px;"></div>
        </div>
      </div>
      <div class="page-content">
        <!-- Stats Overview -->
        <div class="grid-4" style="margin-bottom:28px;" id="statsSection">
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-info">
              <div class="stat-value" id="statTotalUsers">-</div>
              <div class="stat-label">Total Users</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon teal">🎓</div>
            <div class="stat-info">
              <div class="stat-value" id="statStudents">-</div>
              <div class="stat-label">Students</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon yellow">🏆</div>
            <div class="stat-info">
              <div class="stat-value" id="statMentors">-</div>
              <div class="stat-label">Mentors</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon red">📅</div>
            <div class="stat-info">
              <div class="stat-value" id="statSessions">-</div>
              <div class="stat-label">Sessions</div>
            </div>
          </div>
        </div>

        <div class="grid-2" style="margin-bottom:28px;align-items:start;" id="overviewSection">
          <!-- Top Mentors -->
          <div class="card">
            <div class="section-header">
              <h2>Top Mentors</h2>
            </div>
            <div id="topMentorsList">
              <div class="loading-overlay">
                <div class="spinner"></div>
              </div>
            </div>
          </div>
          <!-- Category Stats -->
          <div class="card">
            <div class="section-header">
              <h2>Categories</h2>
            </div>
            <div id="catList">
              <div class="loading-overlay">
                <div class="spinner"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Users Table Section -->
        <div class="card" id="usersSection">
          <div class="section-header">
            <h2>User Management</h2><span id="userCount" class="badge badge-primary"></span>
          </div>
          <div class="filter-bar">
            <input class="form-control search-input" id="userSearch" placeholder="🔍 Search by name or email..." />
            <select class="form-control" id="roleFilter" style="max-width:160px;">
              <option value="">All Roles</option>
              <option value="student">Students</option>
              <option value="mentor">Mentors</option>
              <option value="admin">Admins</option>
            </select>
          </div>
          <div style="overflow-x:auto;">
            <table class="users-table">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Joined</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr>
                  <td colspan="6" style="text-align:center;padding:40px">
                    <div class="spinner"></div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    const user = requireAuth(['admin']);
    if (user) {
      document.getElementById('userBadge').innerHTML = `${renderAvatar(user.name, 'sm')} <span style="font-weight:600;font-size:0.9rem">${user.name}</span>`;
      loadStats(); loadUsers();
    }
    async function loadStats() {
      try {
        const data = await api.getAdminStats();
        const s = data.stats;
        document.getElementById('statTotalUsers').textContent = s.users.total;
        document.getElementById('statStudents').textContent = s.users.students;
        document.getElementById('statMentors').textContent = s.users.mentors;
        document.getElementById('statSessions').textContent = s.sessions.total;
        // Top mentors
        document.getElementById('topMentorsList').innerHTML = s.topMentors.length === 0
          ? `<div class="empty-state"><div class="empty-icon">🏆</div><p>No mentors yet</p></div>`
          : s.topMentors.map((m, i) => `
            <div class="cat-bar">
              <div class="cat-bar-info">
                <span style="font-weight:700;color:var(--accent-primary)">#${i + 1}</span>
                ${renderAvatar(m.name, 'sm')}
                <div><div style="font-size:0.9rem;font-weight:600;">${m.name}</div><div style="font-size:0.78rem;color:var(--text-muted)">${m.title || ''}</div></div>
              </div>
              <div style="text-align:right;"><div style="font-size:0.88rem;font-weight:700;">${m.total_sessions} sessions</div><div style="font-size:0.78rem;color:var(--accent-tertiary)">${m.average_rating ? '★' + parseFloat(m.average_rating).toFixed(1) : ''}</div></div>
            </div>`).join('');
        // Categories
        const maxCount = Math.max(...s.categoryStats.map(c => c.mentor_count), 1);
        document.getElementById('catList').innerHTML = s.categoryStats.map(c => `
          <div class="cat-bar">
            <div class="cat-bar-info"><span style="font-size:0.9rem;font-weight:500;">${c.name}</span></div>
            <div style="flex:1;margin:0 16px;"><div class="progress-bar"><div class="progress-fill" style="width:${Math.round(c.mentor_count / maxCount * 100)}%;background:var(--gradient-secondary)"></div></div></div>
            <span class="cat-pct">${c.mentor_count} mentors</span>
          </div>`).join('');
      } catch (err) { console.error(err); }
    }
    async function loadUsers(role = '', search = '') {
      const body = document.getElementById('usersTableBody');
      body.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px"><div class="spinner"></div></td></tr>`;
      try {
        const data = await api.getAllUsers({ role, search });
        document.getElementById('userCount').textContent = data.users.length + ' users';
        if (data.users.length === 0) { body.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted)">No users found</td></tr>`; return; }
        body.innerHTML = data.users.map(u => `
          <tr>
            <td><div style="display:flex;align-items:center;gap:10px;">${renderAvatar(u.name, 'sm')} <strong>${u.name}</strong></div></td>
            <td style="color:var(--text-secondary)">${u.email}</td>
            <td><span class="badge ${u.role === 'admin' ? 'badge-danger' : u.role === 'mentor' ? 'badge-warning' : 'badge-primary'}">${u.role}</span></td>
            <td style="color:var(--text-muted)">${new Date(u.created_at).toLocaleDateString()}</td>
            <td><span class="badge ${u.is_active ? 'badge-success' : 'badge-danger'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="toggleUser(${u.id})" title="Toggle status">${u.is_active ? 'Deactivate' : 'Activate'}</button>
              ${u.role !== 'admin' ? `<button class="btn btn-danger btn-sm" onclick="removeUser(${u.id})" title="Delete">🗑</button>` : ''}
            </td>
          </tr>`).join('');
      } catch (err) { body.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--accent-danger)">${err.message}</td></tr>`; }
    }
    async function toggleUser(id) {
      if (!confirm('Toggle user status?')) return;
      try { await api.toggleUserStatus(id); showToast('User status updated', 'success'); loadUsers(document.getElementById('roleFilter').value, document.getElementById('userSearch').value); }
      catch (e) { showToast(e.message, 'error'); }
    }
    async function removeUser(id) {
      if (!confirm('Permanently delete this user?')) return;
      try { await api.deleteUser(id); showToast('User deleted', 'success'); loadUsers(document.getElementById('roleFilter').value, document.getElementById('userSearch').value); }
      catch (e) { showToast(e.message, 'error'); }
    }
    let debounceTimer;
    document.getElementById('userSearch').addEventListener('input', (e) => { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => loadUsers(document.getElementById('roleFilter').value, e.target.value), 400); });
    document.getElementById('roleFilter').addEventListener('change', (e) => loadUsers(e.target.value, document.getElementById('userSearch').value));
    
    function showSection(section) {
      if (section === 'users') {
        document.getElementById('statsSection').style.display = 'none';
        document.getElementById('overviewSection').style.display = 'none';
        document.getElementById('usersSection').style.display = 'block';
        document.getElementById('topbarTitle').textContent = 'Manage Users';
        
        document.getElementById('dashLink').classList.remove('active');
        document.getElementById('usersLink').classList.add('active');
      }
    }
  </script>
</body>

</html>
