<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — MentorHub</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    .messages-layout { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - var(--header-height)); overflow:hidden; }
    .conv-list { border-right:1px solid var(--border); overflow-y:auto; }
    .conv-list-header { padding:16px; border-bottom:1px solid var(--border); font-family:var(--font-display); font-weight:700; font-size:1rem; }
    .conv-item { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; transition:var(--transition); border-bottom:1px solid rgba(255,255,255,0.03); }
    .conv-item:hover { background:rgba(255,255,255,0.03); }
    .conv-item.active { background:rgba(108,99,255,0.08); }
    .conv-info { flex:1; min-width:0; }
    .conv-name { font-weight:600; font-size:0.9rem; }
    .conv-last { font-size:0.78rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
    .conv-time { font-size:0.72rem; color:var(--text-muted); white-space:nowrap; }
    .unread-dot { width:8px; height:8px; border-radius:50%; background:var(--accent-primary); flex-shrink:0; }
    .chat-area { display:flex; flex-direction:column; }
    .chat-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .chat-header .partner-name { font-weight:700; font-size:1rem; }
    .chat-header .partner-role { font-size:0.78rem; color:var(--text-muted); }
    .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
    .msg { display:flex; gap:10px; max-width:70%; }
    .msg.mine { margin-left:auto; flex-direction:row-reverse; }
    .msg-bubble { padding:10px 14px; border-radius:18px; font-size:0.88rem; line-height:1.5; }
    .msg.theirs .msg-bubble { background:rgba(255,255,255,0.07); border-radius:18px 18px 18px 4px; }
    .msg.mine .msg-bubble { background:var(--gradient-primary); color:#fff; border-radius:18px 18px 4px 18px; }
    .msg-time { font-size:0.7rem; color:var(--text-muted); margin-top:4px; text-align:right; }
    .chat-input-bar { padding:16px 20px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:flex-end; }
    .chat-input { flex:1; resize:none; min-height:44px; max-height:120px; }
    .chat-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:var(--text-muted); gap:16px; }
    .chat-empty .empty-icon { font-size:3rem; }
    @media(max-width:700px) { .messages-layout { grid-template-columns:1fr; } .conv-list { display:none; } .conv-list.show { display:block; } }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand"><div class="brand-icon">🎓</div> MentorHub</div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer"><a href="#" class="sidebar-link" onclick="logout()"><span class="icon">🚪</span> Logout</a></div>
    </aside>
    <div class="main-content">
      <div class="topbar"><div class="topbar-title">Messages</div><div class="topbar-actions"><div id="userBadge"></div></div></div>
      <div class="messages-layout">
        <!-- Conversations -->
        <div class="conv-list">
          <div class="conv-list-header">Conversations</div>
          <div id="convList"><div class="loading-overlay"><div class="spinner"></div></div></div>
        </div>
        <!-- Chat -->
        <div class="chat-area" id="chatArea">
          <div class="chat-empty"><div class="empty-icon">💬</div><p>Select a conversation to start messaging</p></div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    const user = requireAuth(['student','mentor','admin']);
    let activeUserId = null;
    if (user) {
      document.getElementById('userBadge').innerHTML=`${renderAvatar(user.name,'sm')} <span style="font-weight:600;font-size:0.9rem">${user.name}</span>`;
      const nav = user.role==='mentor'
        ? `<a href="mentor-dashboard.html" class="sidebar-link"><span class="icon">🏠</span> Dashboard</a><a href="sessions.html" class="sidebar-link"><span class="icon">📅</span> Sessions</a><a href="messages.html" class="sidebar-link active"><span class="icon">💬</span> Messages</a><a href="resources.html" class="sidebar-link"><span class="icon">📚</span> Resources</a>`
        : `<a href="student-dashboard.html" class="sidebar-link"><span class="icon">🏠</span> Dashboard</a><a href="find-mentors.html" class="sidebar-link"><span class="icon">🔍</span> Find Mentors</a><a href="sessions.html" class="sidebar-link"><span class="icon">📅</span> Sessions</a><a href="messages.html" class="sidebar-link active"><span class="icon">💬</span> Messages</a><a href="progress.html" class="sidebar-link"><span class="icon">📈</span> Progress</a><a href="resources.html" class="sidebar-link"><span class="icon">📚</span> Resources</a>`;
      document.getElementById('sidebarNav').innerHTML=`<div class="sidebar-section-title">${user.role.charAt(0).toUpperCase()+user.role.slice(1)}</div>${nav}`;
      loadConversations();
      // Check if url has ?user=ID
      const params = new URLSearchParams(window.location.search);
      if (params.get('user')) openChat(+params.get('user'), params.get('name')||'User', '');
    }
    async function loadConversations() {
      try {
        const data = await api.getConversations();
        const list = document.getElementById('convList');
        if (data.conversations.length===0) { list.innerHTML=`<div class="empty-state" style="padding:40px 20px"><div class="empty-icon">💬</div><p style="font-size:0.85rem">No conversations yet</p></div>`; return; }
        list.innerHTML = data.conversations.map(c=>`
          <div class="conv-item ${c.other_user_id===activeUserId?'active':''}" onclick="openChat(${c.other_user_id},'${c.other_name}','${c.other_role||''}')">
            ${renderAvatar(c.other_name,'sm')}
            <div class="conv-info">
              <div class="conv-name">${c.other_name}</div>
              <div class="conv-last">${c.last_message||'No messages yet'}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
              <div class="conv-time">${c.last_message_time?new Date(c.last_message_time).toLocaleDateString():''}</div>
              ${c.unread_count>0?`<div class="unread-dot"></div>`:''}
            </div>
          </div>`).join('');
      } catch(err){ console.error(err); }
    }
    async function openChat(userId, name, role) {
      activeUserId = userId;
      const area = document.getElementById('chatArea');
      area.innerHTML = `
        <div class="chat-header">
          ${renderAvatar(name,'md')}
          <div><div class="partner-name">${name}</div><div class="partner-role">${role||'Member'}</div></div>
        </div>
        <div class="chat-messages" id="chatMessages"><div class="loading-overlay"><div class="spinner"></div></div></div>
        <div class="chat-input-bar">
          <textarea class="form-control chat-input" id="msgInput" placeholder="Type a message..." rows="1"></textarea>
          <button class="btn btn-primary" onclick="sendMsg()">Send →</button>
        </div>`;
      document.getElementById('msgInput').addEventListener('keydown',(e)=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
      loadThread(userId);
    }
    async function loadThread(userId) {
      try {
        const data = await api.getThread(userId);
        const el = document.getElementById('chatMessages');
        if (!el) return;
        if (data.messages.length===0) { el.innerHTML=`<div class="chat-empty"><div class="empty-icon">💬</div><p>Say hello! Start the conversation.</p></div>`; return; }
        el.innerHTML = data.messages.map(m=>{
          const mine = m.sender_id===user.id || m.sender_id===getUser().id;
          return `<div class="msg ${mine?'mine':'theirs'}">
            ${!mine?renderAvatar(m.sender_name,'sm'):''}
            <div><div class="msg-bubble">${m.content}</div><div class="msg-time">${new Date(m.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div></div>
          </div>`;
        }).join('');
        el.scrollTop = el.scrollHeight;
        loadConversations();
      } catch(err){ console.error(err); }
    }
    async function sendMsg() {
      const input = document.getElementById('msgInput');
      const content = input.value.trim();
      if (!content || !activeUserId) return;
      input.value = '';
      try {
        await api.sendMessage({receiver_id:activeUserId, content});
        loadThread(activeUserId);
      } catch(e){ showToast(e.message,'error'); }
    }
  </script>
</body>
</html>
