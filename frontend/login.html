<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — MentorHub</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(108, 99, 255, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-container {
      width: 100%;
      max-width: 460px;
      padding: 20px;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 44px 40px;
      animation: fadeIn 0.4s ease;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 32px;
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .auth-sub {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--accent-primary);
      font-weight: 600;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      color: var(--accent-danger);
      font-size: 0.88rem;
      margin-bottom: 20px;
      display: none;
    }

    .forgot {
      display: block;
      text-align: right;
      font-size: 0.82rem;
      color: var(--accent-primary);
      margin-top: -12px;
      margin-bottom: 20px;
    }

    .input-icon-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }

    .input-icon-wrap .form-control {
      padding-left: 42px;
    }
  </style>
</head>

<body>
  <div class="bg-glow"></div>
  <div class="auth-container">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <div class="brand-icon">🎓</div> MentorHub
      </a>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to continue your mentorship journey.</p>
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" required />
          </div>
        </div>
        <a href="#" class="forgot">Forgot password?</a>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn">Sign In
          →</button>
      </form>
      <div class="auth-footer">Don't have an account? <a href="register.html">Create one free</a></div>
      <div class="divider"></div>
      <div style="text-align:center;font-size:0.78rem;color:var(--text-muted);">
        Demo: <strong style="color:var(--accent-primary)">admin@mentorportal.com</strong> / <strong
          style="color:var(--accent-primary)">password</strong>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (getUser()) {
      const u = getUser();
      if (u.role === 'admin') window.location.href = '/admin-dashboard.html';
      else if (u.role === 'mentor') window.location.href = '/mentor-dashboard.html';
      else window.location.href = '/student-dashboard.html';
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      try {
        const data = await api.login({ email: document.getElementById('email').value, password: document.getElementById('password').value });
        setAuth(data.token, data.user);
        if (data.user.role === 'admin') window.location.href = '/admin-dashboard.html';
        else if (data.user.role === 'mentor') window.location.href = '/mentor-dashboard.html';
        else window.location.href = '/student-dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = 'Sign In →';
        btn.disabled = false;
      }
    });
  </script>
</body>

</html>
